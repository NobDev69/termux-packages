name: Build Termux Bootstrap

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-bootstrap:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v3

    # Update dependencies
    - name: Update dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl docker.io

    # Setup Docker
    - name: Setup Docker
      run: |
        sudo systemctl start docker
        sudo usermod -aG docker $USER

    # Pull Termux Package Builder Docker Image
    - name: Pull Termux package builder
      run: |
        docker pull ghcr.io/termux/package-builder:latest

    # Configure environment variables
    - name: Configure properties
      run: |
        sed -i 's/^TERMUX_APP_PACKAGE=.*/TERMUX_APP_PACKAGE="com.termux.oneshot"/' scripts/properties.sh

    # Run the builder in Docker
    - name: Run Termux package builder
      run: |
        ./scripts/run-docker.sh

    # Upload artifacts
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: termux-bootstrap
        path: ./output-directory  # Adjust to the correct output path
        
